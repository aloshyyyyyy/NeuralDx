{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuralDx | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="flex-center fade-in">

    <div class="card card-center">
        <div class="text-center mb-6">
            <div class="icon-circle" style="margin: 0 auto 16px;">
                <i class="bi bi-cpu"></i>
            </div>
            <h1 class="text-2xl mb-1">NeuralDx</h1>
            <p class="text-muted text-sm">AI-Powered Medical Diagnostics</p>
        </div>

        <form action="/login_post/" method="post">
            {% csrf_token %}

            <div class="input-group mt-6">
                <i class="bi bi-person"></i>
                <input type="text" name="username" class="input-field" placeholder="Username" required>
            </div>

            <div class="input-group">
                <i class="bi bi-lock"></i>
                <input type="password" name="password" class="input-field" placeholder="Password" required>
            </div>

            <button type="submit" class="btn-primary w-full mt-4">Login</button>
        </form>

        <div class="text-center mt-6 pt-6" style="border-top: 1px solid var(--card-border);">
            <p class="text-muted text-sm">Don't have an account? <a href="/register/" class="link-blue">Sign up here</a></p>
        </div>
    </div>

    <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
