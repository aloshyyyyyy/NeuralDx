{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuralDx | Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="flex-center fade-in">

    <div class="card card-center-md">
        <div class="text-center mb-6">
            <div class="icon-circle" style="margin: 0 auto 16px;">
                <i class="bi bi-person-plus"></i>
            </div>
            <h1 class="text-2xl mb-1">Create Account</h1>
            <p class="text-muted text-sm">Join NeuralDx today</p>
        </div>

        {% if error_message %}
            <div class="alert-error">
                <i class="bi bi-exclamation-circle"></i>
                <span>{{ error_message }}</span>
            </div>
        {% endif %}

        <form action="/register_post/" method="post">
            {% csrf_token %}

            <div class="input-group">
                <i class="bi bi-person-badge"></i>
                <input type="text" name="name" class="input-field" placeholder="Full Name" required>
            </div>
            
            <div class="input-group">
                <i class="bi bi-person"></i>
                <input type="text" name="username" class="input-field" placeholder="Username" required>
            </div>

            <div class="input-group">
                <i class="bi bi-envelope"></i>
                <input type="email" name="email" class="input-field" placeholder="Email Address" required>
            </div>

            <div class="input-group">
                <i class="bi bi-telephone"></i>
                <input type="text" name="phone_number" class="input-field" placeholder="Phone Number" required>
            </div>

            <div class="input-group">
                <i class="bi bi-geo-alt"></i>
                <input type="text" name="place" class="input-field" placeholder="City/Place" required>
            </div>

            <div class="input-group">
                <i class="bi bi-lock"></i>
                <input type="password" name="password" class="input-field" placeholder="Password" required>
            </div>

            <div class="input-group">
                <i class="bi bi-shield-lock"></i>
                <input type="password" name="password_confirm" class="input-field" placeholder="Confirm Password" required>
            </div>

            <button type="submit" class="btn-primary w-full mt-4">Register</button>
        </form>

        <div class="text-center mt-6 pt-6" style="border-top: 1px solid var(--card-border);">
            <p class="text-muted text-sm">Already have an account? <a href="/login/" class="link-blue">Sign in here</a></p>
        </div>
    </div>

    <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
